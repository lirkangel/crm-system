spring:
  application:
    name: foundation

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/foundation}
    username: ${DB_USER:foundation}
    password: ${DB_PASS:foundation}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns schema creation
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
    out-of-order: false

  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:25}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:false}

  thymeleaf:
    cache: false                  # disable in dev; enable in prod via profile

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

# ── Foundation-specific properties ──────────────────────────────────────────
foundation:
  jwt:
    secret: ${JWT_SECRET:changeme-use-a-256-bit-base64-encoded-secret-in-production}
    access-ttl-seconds: ${JWT_ACCESS_TTL:900}       # 15 minutes
    refresh-ttl-seconds: ${JWT_REFRESH_TTL:604800}  # 7 days

  plugins:
    directory: ${PLUGINS_DIR:plugins}

  files:
    upload-dir: ${UPLOAD_DIR:uploads}

  security:
    field-key: ${FIELD_ENC_KEY:}   # 32-byte base64 AES-GCM key; REQUIRED in production

logging:
  level:
    com.crm: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO

---
# ── Production profile overrides ────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod
  thymeleaf:
    cache: true
  jpa:
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    com.crm: INFO

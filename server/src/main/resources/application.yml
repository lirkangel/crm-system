spring:
  application:
    name: foundation

  # Default profile for local development runs
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    # Postgres URL placeholder; override via env in each environment
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:foundation}}
    username: ${DB_USER:foundation}
    password: ${DB_PASS:foundation}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns schema creation
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        default_schema: public

  flyway:
    enabled: true
    locations: classpath:db/migration
    # Allow DBs where V1 was applied manually (or restored) without flyway_schema_history.
    baseline-on-migrate: true
    baseline-version: 1
    out-of-order: false

  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USER}
    password: ${SMTP_PASS}
    properties:
      mail.smtp.auth: ${SMTP_AUTH}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS}

  thymeleaf:
    cache: false                  # disable in dev; enable in prod via profile

server:
  port: ${SERVER_PORT}
  error:
    include-message: always
    include-binding-errors: always

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

# ── Foundation-specific properties ──────────────────────────────────────────
foundation:
  jwt:
    # >= 32 UTF-8 bytes required for HS256 (JJWT); override in production via env
    secret: ${JWT_SECRET:abcdefghijklmnopqrstuvwxyz123456}
    access-ttl-seconds: ${JWT_ACCESS_TTL:900}       # access JWT lifetime (seconds)
    refresh-ttl-seconds: ${JWT_REFRESH_TTL:604800}  # 7 days — used by refresh-token flow elsewhere

  plugins:
    directory: ${PLUGINS_DIR:plugins}

  files:
    upload-dir: ${UPLOAD_DIR:uploads}

  security:
    field-key: ${FIELD_ENC_KEY:}   # 32-byte base64 AES-GCM key; REQUIRED in production

logging:
  level:
    com.crm: DEBUG
    org.springframework.security: INFO
    org.flywaydb: INFO

---
# ── Dev profile overrides ───────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.crm: DEBUG

---
# ── Test profile overrides ──────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: test

management:
  health:
    mail:
      enabled: false

logging:
  level:
    com.crm: INFO

---
# ── Production profile overrides ────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: prod
  thymeleaf:
    cache: true
  jpa:
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    com.crm: INFO
